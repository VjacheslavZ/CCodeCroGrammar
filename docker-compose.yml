services:
  postgres:
    image: postgres:17-alpine
    container_name: cro-postgres
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: cro
      POSTGRES_PASSWORD: cro_dev_password
      POSTGRES_DB: cro_grammar
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cro-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
