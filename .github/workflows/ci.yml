name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: cro
          POSTGRES_PASSWORD: cro_dev_password
          POSTGRES_DB: cro_grammar
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=apps/api/src/prisma/schema.prisma

      - name: Lint
        run: npx turbo run lint

      - name: Typecheck
        run: npx turbo run typecheck

      - name: Test
        run: npx turbo run test
        env:
          DATABASE_URL: postgresql://cro:cro_dev_password@localhost:5432/cro_grammar
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-1234567890
          JWT_REFRESH_SECRET: ci-test-jwt-refresh-secret-1234567890
          GOOGLE_CLIENT_ID: test-google-client-id
          GOOGLE_CLIENT_SECRET: test-google-client-secret
          GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
